<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{{room}} - Chatter Box</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0d1117;
    color:white;
    height:100vh;
    display:flex;
    flex-direction:column;
}

/* Header */
.header{
    background:#161b22;
    border-bottom:1px solid rgba(255,255,255,0.07);
    padding:16px 30px;
    display:flex;
    align-items:center;
    gap:12px;
}

.header-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 8px #22c55e;
}

.header h2{
    flex:1;
    font-size:17px;
    font-weight:600;
}

.header-pill{
    font-size:11px;
    color:#94a3b8;
    background:#1e293b;
    border-radius:999px;
    padding:4px 12px;
}

/* Chat Area */
#display{
    flex:1;
    overflow-y:auto;
    padding:20px;
    max-width:900px;
    width:100%;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* Common Bubble */
.container{
    max-width:75%;
    padding:12px 16px;
    border-radius:16px;
    word-wrap:break-word;
    
}

/* Received Message */
.received{
    align-self:flex-start;
    background:#161b22;
    border:1px solid rgba(255,255,255,0.08);
    border-bottom-left-radius:4px;
}

.received b{
    color:#22c55e;
    font-size:13px;
}

.received p{
    margin-top:5px;
    color:#e2e8f0;
}

.received .time-left{
    display:block;
    margin-top:6px;
    font-size:11px;
    color:#64748b;
}

/* Sent Message */
.sent{
    align-self:flex-end;
    background:#22c55e;
    color:white;
    border-bottom-right-radius:4px;
}

.sent b{
    color:white;
    font-size:13px;
}

.sent p{
    margin-top:5px;
    color:white;
}

.sent .time-left{
    display:block;
    margin-top:6px;
    font-size:11px;
    color:rgba(255,255,255,0.8);
}

/* Input Area */
.message-box{
    background:#161b22;
    border-top:1px solid rgba(255,255,255,0.08);
    padding:15px;
}

#post-form{
    max-width:900px;
    margin:auto;
    display:flex;
    gap:10px;
}

input[type=text]{
    flex:1;
    padding:14px 18px;
    border:none;
    outline:none;
    border-radius:999px;
    background:#1f2937;
    color:white;
    font-size:14px;
}

input[type=text]::placeholder{
    color:#64748b;
}

input[type=submit]{
    border:none;
    padding:14px 24px;
    border-radius:999px;
    background:#22c55e;
    color:white;
    cursor:pointer;
    font-weight:600;
}

input[type=submit]:hover{
    background:#16a34a;
}

::-webkit-scrollbar{
    width:5px;
}

::-webkit-scrollbar-thumb{
    background:#374151;
    border-radius:20px;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(5px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .container{
        max-width:90%;
    }

    #post-form{
        flex-direction:column;
    }

    input[type=submit]{
        width:100%;
    }
}
</style>

<script src="https://code.jquery.com/jquery-3.1.1.min.js"></script>

</head>
<body>

<div class="header">
    <div class="header-dot"></div>
    <h2>💬 {{room}}</h2>
    <span class="header-pill">LIVE</span>
</div>

<div id="display"></div>

<div class="message-box">

<form id="post-form">
{% csrf_token %}

<input
type="hidden"
name="username"
id="username"
value="{{username}}">

<input
type="hidden"
name="room_id"
id="room_id"
value="{{room_details.id}}">

<input
type="text"
name="message"
id="message"
placeholder="Type a message..."
autocomplete="off"
required>

<input
type="submit"
value="Send">

</form>

</div>

<script>

$(document).ready(function(){

    setInterval(function(){

        $.ajax({

            type:'GET',
            url:'/getMessages/{{room}}/',

            success:function(response){

                var temp = "";
                var currentUser = $("#username").val();

                for(var key in response.messages){

                    var msgClass =
                    response.messages[key].user === currentUser
                    ? "sent"
                    : "received";

                    temp += `
                    <div class="container ${msgClass}">
                        <b>${response.messages[key].user}</b>
                        <p>${response.messages[key].value}</p>
                        <span class="time-left">
                            ${response.messages[key].date}
                        </span>
                    </div>
                    `;
                }

                $("#display").html(temp);

                $("#display").scrollTop(
                    $("#display")[0].scrollHeight
                );
            }

        });

    },1000);

});

</script>

<script>

$(document).on('submit','#post-form',function(e){

    e.preventDefault();

    $.ajax({

        type:'POST',
        url:'/send',

        data:{
            username:$('#username').val(),
            room_id:$('#room_id').val(),
            message:$('#message').val(),
            csrfmiddlewaretoken:$(
                'input[name=csrfmiddlewaretoken]'
            ).val(),
        },

        success:function(){

            $('#message').val('');

        }

    });

});

</script>

</body>
</html>
