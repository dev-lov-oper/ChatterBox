<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Chat</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0d1117;
            padding:20px;
        }

        .chat-card{
            width:100%;
            max-width:450px;
            background:#161b22;
            border:1px solid #30363d;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 40px rgba(0,0,0,0.35);
            transition:0.3s ease;
        }

        .chat-card:hover{
            transform:translateY(-4px);
            box-shadow:0 15px 50px rgba(0,0,0,0.45);
        }

        .logo{
            text-align:center;
            margin-bottom:35px;
        }

        .chat-icon{
            font-size:55px;
            margin-bottom:10px;
        }

        .logo h1{
            color:#ffffff;
            font-size:32px;
            font-weight:700;
            margin-bottom:8px;
        }

        .logo p{
            color:#8b949e;
            font-size:14px;
        }

        .form-group{
            margin-bottom:22px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#c9d1d9;
            font-size:14px;
            font-weight:500;
        }

        input[type="text"]{
            width:100%;
            padding:14px 16px;
            border:1px solid #30363d;
            border-radius:12px;
            background:#0d1117;
            color:white;
            font-size:15px;
            outline:none;
            transition:0.3s ease;
        }

        input[type="text"]::placeholder{
            color:#6e7681;
        }

        input[type="text"]:focus{
            border-color:#10b981;
            box-shadow:0 0 0 3px rgba(16,185,129,0.15);
        }

        .btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:#10b981;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s ease;
        }

        .btn:hover{
            background:#059669;
            transform:translateY(-2px);
        }

        .btn:active{
            transform:translateY(0);
        }

        .footer-text{
            text-align:center;
            margin-top:20px;
            color:#8b949e;
            font-size:13px;
        }

        @media(max-width:500px){
            .chat-card{
                padding:30px 25px;
            }

            .logo h1{
                font-size:26px;
            }
        }
    </style>
</head>
<body>

    <div class="chat-card">

        <div class="logo">
            <div class="chat-icon">💬</div>
            <h1>Chatter Box</h1>
            <p>Create or join a room and start chatting instantly</p>
        </div>

        <form id="post-form" method="POST" action="checkview">
            {% csrf_token %}

            <div class="form-group">
                <label for="room_name">Room Name</label>
                <input
                    type="text"
                    id="room_name"
                    name="room_name"
                    placeholder="Enter room name"
                    required
                >
            </div>

            <div class="form-group">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="Enter your username"
                    required
                >
            </div>

            <button type="submit" class="btn">
                Enter Room →
            </button>
        </form>

        <div class="footer-text">
            Built with Django 🚀
        </div>

    </div>

</body>
</html>
